name: Generate NowTV EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write   # ✅ REQUIRED

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Recreate script from Base64
        run: |
          echo "$NOWTV_SCRIPT_B64" | base64 -d > nowtv_epg.py
        env:
          NOWTV_SCRIPT_B64: ${{ secrets.NOWTV_SCRIPT_B64 }}

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python nowtv_epg.py

      - name: Commit and push XML
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add nowtv.xml
          git commit -m "Auto update nowtv.xml" || echo "No changes"
          git push
