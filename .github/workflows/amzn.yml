name: Generate AMAZON EPG

on:
  schedule:
    - cron: "* */4 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 🔥 REQUIRED

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Decode script
        run: |
          echo "${{ secrets.GENERATE_JS_B64 }}" | base64 -d > amzn.js

      - name: Run epg_generator
        run: node amazon.js

      - name: Commit & push
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@users.noreply.github.com"

          git add data/amazon.xml

          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto update AMZN EPG"

          git push
