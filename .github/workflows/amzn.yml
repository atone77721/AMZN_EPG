name: Run EPG Script

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Decode AMZN EPG script
        env:
          AMZN_EPG: ${{ secrets.AMZN_EPG }}
        run: |
          echo "$AMZN_EPG" | tr -d '\n' | base64 --decode > amzn_epg.py

      - name: Run script
        env:
          HEADLESS: true
        run: python amzn_epg.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add epg.xml urls.txt channels.json

          git commit -m "Update EPG [auto]" || echo "No changes to commit"

          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: epg-output
          path: |
            epg.xml
            urls.txt
            channels.json
